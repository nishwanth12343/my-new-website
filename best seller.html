<!DOCTYPE html>

<head>

<title>Best Sellers - Home Decor</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f1ee;
}

/* Header */
header {
    background-color: #6d4c41;
    color: white;
    text-align: center;
    padding: 15px;
}

/* Section Title */
h2 {
    text-align: center;
    margin-top: 20px;
    color: #5d4037;
}

/* Product Container */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin: 20px;
}

/* Product Card */
.card {
    background-color: white;
    width: 220px;
    margin: 15px;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: center;
}

/* Product Image */
.card img {
    width: 100%;
    height: 180px;
    border-radius: 6px;
}

/* Price */
.price {
    color: #a67c52;
    font-weight: bold;
    margin: 10px 0;
}

/* Button */
button {
    padding: 8px 12px;
    background-color: #a67c52;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #8d6e63;
}

/* Home Link */
.home-link {
    text-align: center;
    margin: 20px;
}
.home-link a {
    text-decoration: none;
    background-color: #6d4c41;
    color: white;
    padding: 8px 15px;
    border-radius: 5px;
}
</style>

</head>
